<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龙门村档案 - 93号 家族历史</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500&family=Poppins:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: #3a7d5e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 28px; height: 28px; fill: #fff; }
    .site-title {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      font-size: 20px;
      line-height: 28px;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      white-space: nowrap;
      vertical-align: middle;
    }
    body.english .site-title {
      font-family: 'Poppins', sans-serif;
    }

    /* Translate Button */
    .translate-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .translate-btn:hover { transform: scale(1.08); }
    .translate-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ===== Content Area ===== */
    .content {
      padding: 24px 0;
    }

    /* ===== Image Sections ===== */
    .section {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .section:last-child {
      margin-bottom: 0;
    }
    .section img {
      width: 100%;
      max-width: 480px;
      height: auto;
      display: block;
    }

    /* Language toggle */
    .section .lang-cn,
    .footer .lang-cn { display: block; }
    .section .lang-en,
    .footer .lang-en { display: none; }
    body.english .section .lang-cn,
    body.english .footer .lang-cn { display: none; }
    body.english .section .lang-en,
    body.english .footer .lang-en { display: block; }

    /* ===== Footer ===== */
    .footer {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 24px;
      padding-bottom: 40px;
    }
    .footer img {
      width: 100%;
      max-width: 480px;
      height: auto;
      display: block;
    }

    /* ===== Responsive ===== */
    @media (min-width: 768px) {
      .section img { max-width: 520px; }
      .footer img { max-width: 520px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7v2h20V7L12 2zm0 2.5L18.5 7.5h-13L12 4.5zM4 11v8h2v-8H4zm4 0v8h2v-8H8zm4 0v8h2v-8h-2zm4 0v8h2v-8h-2zm4 0v8h2v-8h-2zM2 21h20v2H2v-2z"/></svg>
        </div>
        <span class="site-title" id="siteTitle">龙门村档案</span>
      </div>
      <button class="translate-btn" id="translateBtn" onclick="toggleLanguage()" title="中/En 切换">
        <img src="images/translate.png" alt="中/En">
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="content">

    <!-- Section 1: Hero -->
    <div class="section">
      <img class="lang-cn" src="images/93/Section.png" alt="93号 家族历史">
      <img class="lang-en" src="images/93/Section (3).png" alt="No. 93 Family History">
    </div>

    <!-- Section 2: Overview -->
    <div class="section">
      <img class="lang-cn" src="images/93/Section (1).png" alt="概述">
      <img class="lang-en" src="images/93/Section (4).png" alt="Overview">
    </div>

    <!-- Section 3: Heritage & Evolution -->
    <div class="section">
      <img class="lang-cn" src="images/93/Section (2).png" alt="遗产与演变">
      <img class="lang-en" src="images/93/Section (5).png" alt="Heritage & Evolution">
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <img class="lang-cn" src="images/Footer_cn.png" alt="© 2026 龙门村档案">
    <img class="lang-en" src="images/Footer_en.png" alt="© 2026 Longmencun Archive">
  </footer>

  <script>
    let isEnglish = false;

    function toggleLanguage() {
      isEnglish = !isEnglish;
      document.body.classList.toggle('english', isEnglish);
      document.getElementById('siteTitle').textContent = isEnglish
        ? 'Longmencun Archive'
        : '龙门村档案';
    }
  </script>

</body>
</html>
